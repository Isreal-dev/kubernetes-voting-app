name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Vote Image
      run: |
        docker build -t vote-app -f docker/vote.Dockerfile .

    - name: Build Result Image
      run: |
        docker build -t result-app -f docker/result.Dockerfile .

    - name: Build Worker Image
      run: |
        docker build -t worker-app -f docker/worker.Dockerfile .

    - name: Verify images
      run: docker images