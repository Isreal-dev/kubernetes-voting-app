name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      # This builds all three in parallel!
      matrix:
        service: [vote, result, worker]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build ${{ matrix.service }} Image
      run: |
        # IMPORTANT: Ensure your folder is actually named 'docker' 
        # and files are named 'vote.Dockerfile', etc.
        docker build -t ${{ matrix.service }}-app -f docker/${{ matrix.service }}.Dockerfile .